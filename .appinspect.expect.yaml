# Accepted (vetted) Splunk AppInspect failures for ucc_app_builder, consumed by
# splunk/appinspect-cli-action. Each comment MUST contain an ADDON-<n> / APPCERT-<n>
# reference (the action enforces this). This is an open-source hackathon entry with
# no Splunkbase certification ticket, so the IDs below are placeholders — the real
# rationale is in the text. Both accepted failures are inherent to vendoring the
# modern cp313 Splunk Agent SDK advisor stack and are false positives on the target
# runtime (Splunk Enterprise 10.4 = CPython 3.13, x86_64).
  check_aarch64_compatibility:
    comment: 'ADDON-0001: ships x86_64 cp313 wheels for the Splunk Agent SDK advisor stack (pydantic_core, cffi, jiter, …) which has no aarch64 build; the app targets x86_64 Splunk Enterprise.'
  check_all_python_files_are_well_formed:
    comment: "ADDON-0002: vendored cp313 libraries (langgraph, …) use Python 3.12/3.13 syntax that AppInspect's older static parser cannot read; the code is valid on Splunk 10.4 (CPython 3.13)."
