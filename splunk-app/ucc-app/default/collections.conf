# Per-session add-on project file storage (the VFS the AI authors into).
[ucc_builder_files]
field.session = string
field.path = string
field.content = string
field.updated_at = number

# Saved add-on projects ("My Apps") — one row per (user, appId), files as a JSON blob.
[ucc_builder_apps]
field.uid = string
field.appId = string
field.name = string
field.version = string
field.files = string
field.updated_at = number
