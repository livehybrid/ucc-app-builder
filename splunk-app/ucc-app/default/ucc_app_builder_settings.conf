# Build engine (Node ucc-gen + AppInspect) the MCP build/package tools proxy to.
# Set url to the deployment's build engine, e.g. https://host:3011
[build_engine]
url =

# In-app advisor (splunklib.ai), provider-agnostic. Configure in the app UI
# (App Builder Advisor -> AI Settings); API keys are stored in storage/passwords
# (realm ucc_app_builder, user <provider>_api_key), never here.
[advisor]
# Provider: openrouter | openai | anthropic | google
ai_provider = openrouter
# OpenAI-compatible base URL (used by openrouter/openai). OpenRouter default:
ai_base_url = https://openrouter.ai/api/v1
# Default model (for OpenRouter, pick a tool-enabled/agentic model).
ai_model = anthropic/claude-sonnet-4.6
# Sampling temperature (blank = provider default).
temperature =
# Max agent steps per run (author + build_and_inspect iterations need headroom).
max_steps = 40

# AI provider — managed by the UCC Configuration page (Configuration -> AI Provider).
# This is the canonical, unified AI config consumed by BOTH the in-Splunk advisor
# (splunklib.ai) and the embedded SPA's AI (via the REST proxy -> Node engine). The
# stanza must exist here for the UCC settings handler to edit it; the api_key is
# stored encrypted in storage/passwords (not in this file).
[ai_provider]
provider = openrouter
base_url = https://openrouter.ai/api/v1
model = anthropic/claude-sonnet-4.6
temperature = 0.3
build_model = anthropic/claude-sonnet-4.6
build_temperature = 0.1
completion_model = anthropic/claude-haiku-4.5
completion_temperature = 0.1
max_iterations = 40
