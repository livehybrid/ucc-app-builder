# Allowlist this app's custom REST endpoints for the Splunk Web splunkd proxy
# (/<locale>/splunkd/__raw/services/...), so the App Builder Advisor page (served
# from appserver/static) can call them via splunkjs. Without these, Splunk Web
# returns 404 even though the endpoints exist on splunkd (8089).

[expose:ucc_app_builder_tools]
pattern = ucc_app_builder/*
methods = GET, POST

[expose:ucc_app_builder_advisor]
pattern = ucc_app_builder/advisor
methods = POST

# The embedded SPA's API proxy (forwards /api/* to the Node build engine).
# CSRF: handled client-side — ui_loader.js sends X-Splunk-Form-Key + X-Requested-With
# on proxied POSTs (Splunk ignores app-level skipCSRFProtection, so it can't be set here).
[expose:ucc_app_builder_proxy_root]
pattern = ucc_app_builder/proxy
methods = GET, POST, PUT, DELETE

[expose:ucc_app_builder_proxy]
pattern = ucc_app_builder/proxy/*
methods = GET, POST, PUT, DELETE

# UCC Configuration page (AI Provider settings) REST endpoints.
[expose:ucc_app_builder_settings]
pattern = ucc_app_builder_settings
methods = POST, GET

[expose:ucc_app_builder_settings_specified]
pattern = ucc_app_builder_settings/*
methods = POST, GET, DELETE
