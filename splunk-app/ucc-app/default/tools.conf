# Splunk MCP tool registration. Each [restmap:<tool>] maps an MCP tool to a REST
# endpoint_name (see restmap.conf). The Splunk AI Assistant calls these to build a
# UCC add-on. Build a project: ucc_create_addon -> ucc_write_file globalConfig.json
# -> ucc_build_and_inspect (repeat on findings) -> ucc_package.

[restmap:ucc_ping]
description = Health check for the UCC App Builder. Returns { ok, appId, files }. Call first to verify connectivity before other tools.
endpoint_name = ucc_ping
method = get
tags = ucc_app_builder, health, ping

[restmap:ucc_create_addon]
description = Start (or reset) a UCC add-on project for this session. Provide a name; appId is derived (TA_<name>). Call first, then author globalConfig.json with ucc_write_file.
endpoint_name = ucc_create_addon
method = post
tags = ucc_app_builder, create

[restmap:ucc_write_file]
description = Author or overwrite a project file (globalConfig.json at the root, package/bin/<input>.py, package/lib/requirements.txt). This is how you build the add-on; the Monaco UI shows the same files. Confined to the project subtree.
endpoint_name = ucc_write_file
method = post
tags = ucc_app_builder, author

[restmap:ucc_read_file]
description = Read one project file back. Returns its content or a not-found note.
endpoint_name = ucc_read_file
method = post
tags = ucc_app_builder, read

[restmap:ucc_list_project]
description = List the files currently in the add-on project.
endpoint_name = ucc_list_project
method = get
tags = ucc_app_builder, list

[restmap:ucc_build_and_inspect]
description = Run the self-correcting loop: ucc-gen build -> Splunk AppInspect -> auto-fix -> repeat until AppInspect-CLEAN (or maxIterations). Returns the loop trace + remaining findings. Author globalConfig.json first.
endpoint_name = ucc_build_and_inspect
method = post
tags = ucc_app_builder, build, appinspect

[restmap:ucc_package]
description = Build + AppInspect-validate with auto-fix and return the path to an installable, AppInspect-clean .tar.gz.
endpoint_name = ucc_package
method = post
tags = ucc_app_builder, package
