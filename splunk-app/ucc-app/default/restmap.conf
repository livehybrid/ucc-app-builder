# REST endpoints backing the MCP tools (tools.conf). One script + handler;
# the handler dispatches on the matched path's trailing segment.
[script:ucc_ping]
match = /ucc_app_builder/ping
script = builder_tools.py
scripttype = persist
handler = builder_tools.BuilderHandler
python.version = python3
python.required = python3
passPayload = true
passSystemAuth = true

