[script:ucc_proxy]
match = /ucc_app_builder/proxy
script = builder_proxy.py
scripttype = persist
handler = builder_proxy.ProxyHandler
# 3.13: reads the UCC Configuration-page AI key via solnlib (to inject it to the
# Node engine), whose stack uses 3.10+ syntax that crashes on Splunk's 3.9.
# python.version satisfies check_rest_handler_python_executable_exists; python.required
# = 3.13 takes precedence at runtime.
python.version = python3
python.required = 3.13
passPayload = true
passSystemAuth = true
passHttpHeaders = true

# UCC Configuration page handler (AI Provider tab). The handler file
# ucc_app_builder_rh_settings.py is generated by ucc-gen into bin/; these stanzas are
# kept here because the custom restmap.conf above shadows ucc-gen's generated one.
# The [admin:<app>] stanza EXPOSES the admin_external handler in the EAI tree.
[admin:ucc_app_builder]
match = /
members = ucc_app_builder_settings

[admin_external:ucc_app_builder_settings]
handlertype = python
# Run on python 3.13 — the vendored solnlib / splunklib / urllib3 / requests /
# charset_normalizer stack is built for 3.13 and uses `X | Y` union syntax that
# TypeErrors on Splunk's default 3.9 persistent-handler python.
python.version = python3
python.required = 3.13
handlerfile = ucc_app_builder_rh_settings.py
handleractions = edit, list
handlerpersistentmode = true
