[script:ucc_advisor]
match = /ucc_app_builder/advisor
script = builder_advisor.py
scripttype = persist
handler = builder_advisor.AdvisorHandler
# 3.13: this handler imports solnlib (to read the UCC Configuration-page AI key),
# whose dependency stack uses 3.10+ union syntax that crashes on Splunk's 3.9.
# python.version satisfies AppInspect's check_rest_handler_python_executable_exists;
# python.required = 3.13 takes precedence at runtime (selects python 3.13).
python.version = python3
python.required = 3.13
passPayload = true
passSystemAuth = true

# Splunk Agent SDK (splunklib.ai) chat backend — job + poll (the proxy can't stream).
# Both run on 3.13 for the same reason as the Advisor (the vendored agent/solnlib stack
# uses 3.10+ union syntax that TypeErrors on Splunk's default 3.9 persistent python).
[script:ucc_agent_start]
match = /ucc_app_builder/agent_start
script = builder_agent.py
scripttype = persist
handler = builder_agent.AgentHandler
python.version = python3
python.required = 3.13
passPayload = true
passSystemAuth = true

